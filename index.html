<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sercan Düzel</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:white;margin:0}
#spaceShip{position:fixed;top:100px;left:20px;background:#111827;padding:15px;border-radius:50px;cursor:pointer;z-index:999}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.box{background:#111;padding:20px;border-radius:12px;text-align:center}
.gbtn{margin:5px;padding:10px 15px;background:#1f2937;border:none;color:white;border-radius:8px;cursor:pointer}
.dashboard{padding:40px}
.card{background:#111827;padding:20px;border-radius:12px;margin:10px;display:inline-block}
</style>
</head>
<body>

<div id="spaceShip">🛸 Play Game</div>

<div class="modal" id="gameModal">
  <div class="box">
    <h2>Select Game</h2>
    <button class="gbtn" onclick="startGame('ufo')">UFO Run</button>
    <button class="gbtn" onclick="startGame('snake')">Snake</button>
    <button class="gbtn" onclick="startGame('flappy')">Flappy</button>
    <br><br>
    <canvas id="gameCanvas" width="300" height="400"></canvas>
  </div>
</div>

<div class="dashboard">
  <div class="card">
    <h3>Game Clicks</h3>
    <strong id="gameClicks">0</strong>
  </div>
  <div class="card">
    <h3>Today Visits</h3>
    <strong id="todayVisits">0</strong>
  </div>
</div>

<script>
const today = new Date().toISOString().slice(0,10);
let visits = JSON.parse(localStorage.getItem("visits") || "{}");
if(!visits[today]) visits[today]=0;
visits[today]++;
localStorage.setItem("visits", JSON.stringify(visits));
document.getElementById("todayVisits").innerText = visits[today];

let gameClicks = parseInt(localStorage.getItem("gameClicks") || 0);
document.getElementById("gameClicks").innerText = gameClicks;

document.getElementById("spaceShip").onclick = () => {
  document.getElementById("gameModal").classList.add("open");
  gameClicks++;
  localStorage.setItem("gameClicks", gameClicks);
  document.getElementById("gameClicks").innerText = gameClicks;
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function startGame(type){
  if(type==="snake") snakeGame();
  if(type==="flappy") flappyGame();
  if(type==="ufo") ufoGame();
}

function snakeGame(){
  let snake=[{x:150,y:150}],food={x:100,y:100},dx=10,dy=0;
  document.onkeydown=e=>{
    if(e.key==="ArrowUp"){dx=0;dy=-10}
    if(e.key==="ArrowDown"){dx=0;dy=10}
    if(e.key==="ArrowLeft"){dx=-10;dy=0}
    if(e.key==="ArrowRight"){dx=10;dy=0}
  }
  setInterval(()=>{
    ctx.clearRect(0,0,300,400);
    let head={x:snake[0].x+dx,y:snake[0].y+dy};
    snake.unshift(head);
    if(head.x===food.x && head.y===food.y){
      food={x:Math.floor(Math.random()*30)*10,y:Math.floor(Math.random()*40)*10}
    } else snake.pop();
    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,10,10);
  },100);
}

function flappyGame(){
  let y=200,velocity=0;
  document.onclick=()=>velocity=-5;
  setInterval(()=>{
    ctx.clearRect(0,0,300,400);
    velocity+=0.3;
    y+=velocity;
    ctx.fillStyle="yellow";
    ctx.fillRect(100,y,20,20);
  },30);
}

function ufoGame(){
  let x=150;
  document.onkeydown=e=>{
    if(e.key==="ArrowLeft") x-=10;
    if(e.key==="ArrowRight") x+=10;
  }
  setInterval(()=>{
    ctx.clearRect(0,0,300,400);
    ctx.fillStyle="white";
    ctx.fillRect(x,350,20,20);
  },50);
}
</script>

</body>
</html>
